name: Auto Grade SJF

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install GCC
      run: sudo apt update && sudo apt install -y gcc

    - name: Give permission
      run: chmod +x test.sh

    - name: Run tests
      run: ./test.sh
